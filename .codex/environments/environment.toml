# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "sf-rag"

[setup]
script = ""

[setup.darwin]
script = '''
cd "$CODEX_WORKTREE_PATH"

python3 -m venv .venv
source .venv/bin/activate

python3 -m pip install --upgrade pip
python3 -m pip install -r requirements.txt
'''

[cleanup]
script = ""

[cleanup.darwin]
script = '''
cd "$CODEX_WORKTREE_PATH"

deactivate 2>/dev/null || true

rm -rf .pytest_cache
rm -rf .mypy_cache
rm -rf .ruff_cache
rm -rf .cache
rm -rf __pycache__
find . -type d -name "__pycache__" -prune -exec rm -rf {} +
find . -type f -name ".DS_Store" -delete
'''

[[actions]]
name = "Run pipeline"
icon = "run"
command = '''
cd "$CODEX_WORKTREE_PATH"
source .venv/bin/activate
python3 scripts/run_pipeline.py
'''

[[actions]]
name = "Validate grounding docs"
icon = "run"
command = '''
cd "$CODEX_WORKTREE_PATH"
source .venv/bin/activate
python3 scripts/validate_grounding_docs.py
'''

[[actions]]
name = "Git Status"
icon = "run"
command = '''
cd "$CODEX_WORKTREE_PATH"
git status --short
'''

[[actions]]
name = "Debug"
icon = "debug"
command = '''
npm run dev
python app.py
uvicorn app.main:app --reload
'''
